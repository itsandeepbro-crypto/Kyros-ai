<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYROS Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .gradient-border {
            border: 1px solid transparent;
            background: linear-gradient(#0a0a0a, #0a0a0a) padding-box,
                        linear-gradient(90deg, #06b6d4, #3b82f6) border-box;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .terminal-line { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-cyan-500/30">
    <div class="fixed inset-0 opacity-[0.03] pointer-events-none" style="background: linear-gradient(90deg, #fff 1px, transparent 0), linear-gradient(#fff 1px, transparent 0); background-size: 40px 40px;"></div>

    <header class="p-6 flex justify-between items-center bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center glow">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M11 9h4.5L11 14h4.5"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tighter uppercase italic">KYROS</h1>
                <p class="text-[10px] text-cyan-500/70 tracking-widest uppercase mono">OS Interface 1.6</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <div class="hidden md:flex gap-4 text-[10px] text-white/40 uppercase tracking-widest mono">
                <span class="flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div> KERNEL: ONLINE</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8 flex flex-col min-h-[calc(100vh-100px)]">
        <!-- Terminal Display -->
        <div id="terminal" class="flex-1 bg-[#0a0a0a] border border-white/10 rounded-2xl p-6 overflow-y-auto mb-6 scroll-hide min-h-[400px] shadow-2xl relative">
            <div class="text-[11px] text-cyan-500/40 mono mb-4 uppercase tracking-widest border-b border-white/5 pb-2">:: System Initialization Successful :: Ready to receive commands</div>
            <div id="output" class="space-y-3 mono text-xs"></div>
        </div>

        <!-- Intent Status -->
        <div id="intent-box" class="hidden mb-6 p-4 bg-white/5 border border-white/10 rounded-xl animate-bounce-in">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-[9px] text-white/40 uppercase mono mb-1">Parsed Intelligence</p>
                    <h4 id="intent-type" class="text-sm font-bold text-white tracking-wide">Intent Detected</h4>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-white/40 uppercase mono mb-1">Routing Payload</p>
                    <p id="intent-detail" class="text-[10px] text-cyan-400 font-mono"></p>
                </div>
            </div>
        </div>

        <!-- Command Input -->
        <form id="cmd-form" class="relative group mt-auto">
            <button type="button" id="mic-btn" class="absolute left-3 top-3 w-10 h-10 bg-white/5 hover:bg-red-500/20 rounded-xl flex items-center justify-center border border-white/10 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/40"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </button>
            <input 
                type="text" 
                id="cmd-input" 
                placeholder="Enter command or tap mic..." 
                class="w-full bg-[#111] border border-white/10 rounded-2xl py-5 px-6 pl-16 pr-16 text-sm focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all mono placeholder:text-white/10 shadow-xl"
                autocomplete="off"
            >
            <button type="submit" class="absolute right-3 top-3 w-10 h-10 bg-white/5 hover:bg-cyan-500/20 rounded-xl flex items-center justify-center border border-white/10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/40 group-focus-within:text-cyan-500"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>

        <!-- Quick Tabs -->
        <div class="mt-6 flex flex-wrap gap-2 justify-center">
            <button onclick="fillCmd('flashlight on')" class="px-4 py-2 bg-white/5 border border-white/5 rounded-full text-[10px] text-white/40 hover:text-white transition-all mono">Flash On</button>
            <button onclick="fillCmd('battery status')" class="px-4 py-2 bg-white/5 border border-white/5 rounded-full text-[10px] text-white/40 hover:text-white transition-all mono">Battery</button>
            <button onclick="fillCmd('search tech news on google')" class="px-4 py-2 bg-white/5 border border-white/5 rounded-full text-[10px] text-white/40 hover:text-white transition-all mono">Google</button>
            <button onclick="fillCmd('open youtube')" class="px-4 py-2 bg-white/5 border border-white/5 rounded-full text-[10px] text-white/40 hover:text-white transition-all mono">YouTube</button>
        </div>
    </main>

    <script>
        const form = document.getElementById('cmd-form');
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        const intentBox = document.getElementById('intent-box');

        const micBtn = document.getElementById('mic-btn');

        micBtn.onclick = () => {
            input.value = "voice";
            form.dispatchEvent(new Event('submit'));
        };

        const addLine = (text, type = 'output') => {
            const div = document.createElement('div');
            div.className = `terminal-line ${type === 'input' ? 'text-white' : 'text-white/50'}`;
            div.innerHTML = `<span class="opacity-30 mr-2">${type === 'input' ? 'λ' : '>'}</span>${text}`;
            output.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        };

        const fillCmd = (cmd) => {
            input.value = cmd;
            input.focus();
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const cmd = input.value.trim();
            if(!cmd) return;

            addLine(cmd, 'input');
            input.value = '';

            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await response.json();

                if(data.status === 'success') {
                    intentBox.classList.remove('hidden');
                    document.getElementById('intent-type').innerText = data.intent.type;
                    document.getElementById('intent-detail').innerText = JSON.stringify(data.intent);
                    addLine(`[EXECUTION SUCCESS] ${data.message}`);
                } else {
                    addLine(`[ERROR] ${data.message}`, 'error');
                }
            } catch (err) {
                addLine(`[SYSTEM FAULT] Failed to communicate with core.`, 'error');
            }
        };

        // Command history and greeting
        addLine("KYROS Interface version 1.6 established.", 'output');
        addLine("Protocol: Web Native Intent Bridge.", 'output');
    </script>
</body>
</html>
